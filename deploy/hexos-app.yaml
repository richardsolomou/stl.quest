# Paste into TrueNAS UI (HexOS advanced access): Apps -> Discover -> ⋮ -> Install via YAML.
# Fill in the two <...> placeholders first.
#
# Uses the NAS's existing cloudflared: add a public hostname on that tunnel
# pointing at http://<NAS-LAN-IP>:3010, and put a Cloudflare Access application
# (email allowlist) on the same hostname. Note: because the port is published,
# devices on the LAN can reach the app directly and set the identity header
# themselves — fine on a trusted home network; add Cf-Access JWT verification
# later if that ever stops being true.
services:
  app:
    image: ghcr.io/richardsolomou/printhub:v0.12.0
    restart: unless-stopped
    ports:
      - '3010:3000'
    environment:
      CONVEX_ACTION_SECRET: <same value as APP_WRITE_SECRET on the Convex deployment>
      ADMIN_EMAILS: <you@example.com>
    volumes:
      - /mnt/HDDs/Applications/print-queue/prints:/prints
