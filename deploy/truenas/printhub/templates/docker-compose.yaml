{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.printhub_container_name, "image") %}

{% do c1.healthcheck.set_custom_test("wget -q --spider http://127.0.0.1:%d/api/health"|format(values.consts.internal_web_port)) %}

{% do c1.environment.add_user_envs(values.printhub.additional_envs) %}

{% if not values.network.host_network %}
  {% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}
{% endif %}

{% do c1.add_storage("/data", values.storage.data) %}
{% do c1.add_storage("/prints", values.storage.prints) %}

{% do tpl.portals.add(values.network.web_port, {"port": values.consts.internal_web_port if values.network.host_network else None}) %}

{{ tpl.render() | tojson }}
