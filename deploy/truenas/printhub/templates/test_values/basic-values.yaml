printhub:
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 30110
  host_network: false

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      acl_enable: false
  prints:
    type: host_path
    host_path_config:
      path: /opt/tests/printhub-prints
      acl_enable: false

labels: []

resources:
  limits:
    cpus: 2
    memory: 4096
