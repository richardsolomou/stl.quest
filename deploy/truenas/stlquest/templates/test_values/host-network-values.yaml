stlquest:
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 30059
    host_ips: []
  host_network: true

ix_volumes:
  data: /opt/tests/mnt/data
  prints: /opt/tests/mnt/prints

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      acl_enable: false
      create_host_path: true
  prints:
    type: ix_volume
    ix_volume_config:
      dataset_name: prints
      acl_enable: false
      create_host_path: true

labels: []

resources:
  limits:
    cpus: 2
    memory: 4096
