name: Build and push image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

jobs:
  check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable && corepack prepare pnpm@11.12.0 --activate
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm db:check
      - run: pnpm catalog:check
      # Build first: it generates src/routeTree.gen.ts, which typecheck needs.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:cli

  e2e:
    if: github.event_name != 'schedule'
    name: E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: journey
            spec: e2e/printhub.spec.ts
          - suite: request ordering
            spec: e2e/request-ordering.spec.ts
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable && corepack prepare pnpm@11.12.0 --activate
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Read Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: pnpm exec playwright install-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
      - run: pnpm exec playwright test ${{ matrix.spec }}

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high

  minio-contract:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable && corepack prepare pnpm@11.12.0 --activate
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start pinned MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:RELEASE.2025-10-15T17-29-55Z server /data
          for _ in {1..30}; do curl -fsS http://127.0.0.1:9000/minio/health/live && exit 0; sleep 2; done
          docker logs minio
          exit 1
      - run: pnpm exec vitest run src/adapters/storeContract.test.ts
        env:
          MINIO_TEST_URL: http://127.0.0.1:9000
          MINIO_TEST_ACCESS_KEY: minioadmin
          MINIO_TEST_SECRET_KEY: minioadmin

  release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [check, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.release.outputs.created }}
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESETS_TOKEN || secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - run: corepack enable && corepack prepare pnpm@11.12.0 --activate
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Release directly from main
        id: release
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            {
              echo "created=false"
              echo "tag="
              echo "sha=$GITHUB_SHA"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changeset_count="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md | wc -l | tr -d ' ')"
          if [ "$changeset_count" = "0" ]; then
            {
              echo "created=false"
              echo "tag="
              echo "sha=$GITHUB_SHA"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pnpm version-packages

          tag="v$(node -p "require('./package.json').version")"
          git fetch --tags origin
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi

          git add .changeset CHANGELOG.md deploy/truenas/printhub/app.yaml package.json
          git commit -m "chore: release ${tag} [skip ci]"
          release_sha="$(git rev-parse HEAD)"
          git tag "$tag"
          git push origin HEAD:main "$tag"
          gh release create "$tag" --title "$tag" --generate-notes

          {
            echo "created=true"
            echo "tag=$tag"
            echo "sha=$release_sha"
          } >> "$GITHUB_OUTPUT"

  build-image:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [check, e2e, release]
    name: Build image (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.sha }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          provenance: mode=max
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/printhub,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=printhub-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=printhub-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [check, e2e, release, build-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-platform image
        working-directory: ${{ runner.temp }}/digests
        run: |
          images=()
          for digest in *; do
            images+=("${IMAGE}@sha256:${digest}")
          done

          tags=(
            --tag "${IMAGE}:latest"
            --tag "${IMAGE}:sha-${IMAGE_SHA}"
          )
          if [ "$RELEASE_CREATED" = "true" ]; then
            tags+=(--tag "${IMAGE}:${RELEASE_TAG}")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "${images[@]}"
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/printhub
          IMAGE_SHA: ${{ needs.release.outputs.sha }}
          RELEASE_CREATED: ${{ needs.release.outputs.created }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/printhub:sha-${{ needs.release.outputs.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: vuln
          hide-progress: true
