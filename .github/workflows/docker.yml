name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Require VITE_CONVEX_URL
        run: test -n "${{ vars.VITE_CONVEX_URL }}" || { echo "VITE_CONVEX_URL repo variable is not set"; exit 1; }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/printhub:latest
            ghcr.io/${{ github.repository_owner }}/printhub:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/printhub:sha-${{ github.sha }}
          build-args: |
            VITE_CONVEX_URL=${{ vars.VITE_CONVEX_URL }}
