name: PR preview prune

on:
  schedule:
    - cron: '41 4 * * 1'
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prune previews without open pull requests
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_ENVIRONMENT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OPEN_PR_NUMBERS="$(gh pr list --state open --limit 1000 --json number --jq '.[].number' | tr '\n' ' ')"
          export OPEN_PR_NUMBERS
          pnpm exec tsx scripts/dokployPreview.ts prune
